name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore test project
        run: dotnet restore Tests/RevitXmiExporter.Tests/RevitXmiExporter.Tests.csproj

      - name: Build test project
        run: dotnet build Tests/RevitXmiExporter.Tests/RevitXmiExporter.Tests.csproj --configuration Release --no-restore

      - name: Check code formatting (test project)
        run: dotnet format Tests/RevitXmiExporter.Tests/RevitXmiExporter.Tests.csproj --verify-no-changes --verbosity diagnostic

      - name: Run tests with coverage
        run: dotnet test Tests/RevitXmiExporter.Tests/RevitXmiExporter.Tests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: ./coverage
          retention-days: 30
